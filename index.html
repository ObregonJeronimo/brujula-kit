<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brújula KIT — Evaluación Fonoaudiológica</title>
    <link rel="icon" type="image/png" href="/img/logo_96.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      // Apply cached theme color before React loads
      try{var t=JSON.parse(localStorage.getItem("bk_theme"));if(t&&t.primary){var h=t.primary,a=(t.primaryAlpha!=null?t.primaryAlpha:100)/100;if(a<1){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);h="#"+((1<<24)+(Math.round(r*a+255*(1-a))<<16)+(Math.round(g*a+255*(1-a))<<8)+Math.round(b*a+255*(1-a))).toString(16).slice(1)}document.body.style.background=h}}catch(e){}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
